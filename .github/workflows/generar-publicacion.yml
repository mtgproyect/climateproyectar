name: Generar publicación operativa

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generar-publicacion-operativa
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Generar archivos de publicación
        run: |
          python scripts/generar_publicacion_operativa.py \
            --expect-localities 10601 \
            --expect-forecasts 475 \
            --expect-stations 121

      - name: Ejecutar pruebas
        run: python -m unittest discover -s tests -v

      - name: Guardar publicación
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/publicacion

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Generar publicación operativa"
            git push
          fi
