name: Construir catálogo maestro

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: construir-catalogo-maestro
  cancel-in-progress: false

jobs:
  construir:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar catálogo actual de producción
        run: python scripts/descargar_produccion.py

      - name: Construir catálogo maestro
        run: python scripts/construir_catalogo_maestro.py --require-production

      - name: Validar catálogo maestro
        run: python scripts/validar_catalogo_maestro.py

      - name: Ejecutar pruebas
        run: python -m unittest discover -s tests -v

      - name: Guardar resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/fuentes/localidades_produccion.json \
            data/fuentes/localidades_produccion.meta.json \
            docs/data/catalogo_maestro.json \
            docs/data/informe_validacion.json \
            docs/data/conflictos.json
          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Actualizar catálogo maestro"
            git push
          fi
